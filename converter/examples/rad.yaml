    tree_root: true
    rules:
    # Rule 1 of 5 — pregnancy_status: blank unless sex = "2"
    - preconditions:
        none_of:
        - slot_conditions:
            sex:
              name: sex
              equals_string: '2'
      postconditions:
        slot_conditions:
          pregnancy_status:
            name: pregnancy_status
            value_presence: ABSENT
      description: pregnancy_status must be blank unless sex = "2"

    # Rule 2 of 5 — covid_test_type_other: blank unless covid_test_type = "90"
    - preconditions:
        none_of:
        - slot_conditions:
            covid_test_type:
              name: covid_test_type
              equals_string: '90'
      postconditions:
        slot_conditions:
          covid_test_type_other:
            name: covid_test_type_other
            value_presence: ABSENT
      description: covid_test_type_other must be blank unless covid_test_type = "90"

    # Rule 3 of 5 — covid_test_specimen_type_other: blank unless covid_test_specimen_type = "90"
    - preconditions:
        none_of:
        - slot_conditions:
            covid_test_specimen_type:
              name: covid_test_specimen_type
              equals_string: '90'
      postconditions:
        slot_conditions:
          covid_test_specimen_type_other:
            name: covid_test_specimen_type_other
            value_presence: ABSENT
      description: covid_test_specimen_type_other must be blank unless covid_test_specimen_type
        = "90"

    # Rule 4 of 5 — covid_test_specimen_collector_other: blank unless covid_test_specimen_collector = "90"
    - preconditions:
        none_of:
        - slot_conditions:
            covid_test_specimen_collector:
              name: covid_test_specimen_collector
              equals_string: '90'
      postconditions:
        slot_conditions:
          covid_test_specimen_collector_other:
            name: covid_test_specimen_collector_other
            value_presence: ABSENT
      description: covid_test_specimen_collector_other must be blank unless covid_test_specimen_collector
        = "90"

    # Rule 5 of 5 — covid_test_result_other: blank unless covid_test_result = "90"
    - preconditions:
        none_of:
        - slot_conditions:
            covid_test_result:
              name: covid_test_result
              equals_string: '90'
      postconditions:
        slot_conditions:
          covid_test_result_other:
            name: covid_test_result_other
            value_presence: ABSENT
      description: covid_test_result_other must be blank unless covid_test_result = "90"
