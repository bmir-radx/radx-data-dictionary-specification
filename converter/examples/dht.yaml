        - range: DhtEthnicityOriginEnum  # 0=No, not of Hispanic or Latino origin | 1=Yes, of Hispanic or Latino origin | 98=Don't know | 99=Prefer not to answer
        - range: StandardMissingValueCodes
        annotations:
          provenance: RADx-DHT DCC
          value_datatype: integer

      # Data element 4 of 119
      dht_age:
        title: What is your age?
        description: |-
          The `dht_age` data element records response to the prompt, _"What is your age?"_.

