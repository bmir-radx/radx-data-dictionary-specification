# --- Classes ---
classes:
  Dht:  # 1 of 1 class
    attributes:
      # Data element 1 of 119
      dht_identity:
        title: What is global identifier of participant?
        description: |-
          The `dht_identity` data element records response to the prompt, _"What is global identifier of participant?"_.

          Values for this data element are strings that are restricted to the list of 1 permissible string values.
        in_subset:
        - Identity
        any_of:
        - range: DhtIdentityEnum  # Text: May be combination of prefix text=letters, numbers, and separator characters
        - range: StandardMissingValueCodes
        annotations:
          provenance: RADx-DHT DCC
          value_datatype: string

      # Data element 2 of 119
      dht_race:
        title: What is your race? Mark one or more boxes
        description: |-
          The `dht_race` data element records response to the prompt, _"What is your race? Mark one or more boxes"_.

          Values for this data element are integers that are restricted to the list of 10 permissible integer values.
        in_subset:
        - Race
        any_of:
        - range: DhtRaceEnum  # 1=American Indian or Alaska Native | 2=Asian | 3=Black or African American | 4=Middle Eastern or North African | 5=Native Hawaiian or Other Pacific Islander | 6=White (+4 more)
        - range: StandardMissingValueCodes
        annotations:
          provenance: RADx-DHT DCC
          value_datatype: integer

      # Data element 3 of 119
      dht_ethnicity_origin:
        title: 'Are you of Hispanic or Latino origin?             '
        description: |-
          The `dht_ethnicity_origin` data element records response to the prompt, _"Are you of Hispanic or Latino origin?             "_.

          Values for this data element are integers that are restricted to the list of 4 permissible integer values.
