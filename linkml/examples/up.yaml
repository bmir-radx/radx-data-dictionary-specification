# --- Classes ---
classes:
  Up:  # 1 of 1 class
    attributes:
      # Data element 1 of 159
      record_id:
        title: Record ID
        description: The `record_id` variable records response to the prompt, _"Record ID"_.
        range: string
        annotations:
          provenance: RADx-UP

      # Data element 2 of 159
      consent_given:
        title: Is consent required for this study?
        description: |-
          The `consent_given` variable records response to the prompt, _"Is consent required for this study?"_.

          Values for this variable are integers that are restricted to the list of 2 permissible integer values.
        comments:
        - Variable is optional based on study design.
        in_subset:
        - Consent
        any_of:
        - range: ConsentGivenEnum  # 1=Yes, consent is required for this study | 0=No, Consent is not required/is waived for this study
        - range: StandardMissingValueCodes
        annotations:
          provenance: RADx-UP
          value_datatype: integer

      # Data element 3 of 159
      # Precondition enforced by rule 1 of 50 (see rules:)
      consentdt_mdy:
        title: Date of Consent (MM/DD/YYYY)
        description: |-
          The `consentdt_mdy` variable records response to the prompt, _"Date of Consent (MM/DD/YYYY)"_.

          This variable only records a non-blank value if the value of `consent_given` is `1`, _"Yes, consent is required for this study"_.
        range: date_mdy
        comments:
        - 'Note: Maximum expected day = Current day. Variable is optional based on study design.'
        in_subset:
        - Consent
        annotations:
          provenance: RADx-UP
          precondition: consent_given = "1"

      # Data element 4 of 159
      # Precondition enforced by rule 2 of 50 (see rules:)
      consent_ident:
        title: 'I agree to let the Duke Clinical Research Institute collect the following
          identifiable information: name, address, contact information, and date of birth.
          (This is to enable linkage of deidentified data.)'
        description: |-
          The `consent_ident` variable records response to the prompt, _"I agree to let the Duke Clinical Research Institute collect the following identifiable information: name, address, contact information, and date of birth. (This is to enable linkage of deidentified data.)"_.

          Values for this variable are integers that are restricted to the list of 2 permissible integer values.

          This variable only records a non-blank value if the value of `consent_given` is `1`, _"Yes, consent is required for this study"_.
        comments:
        - For consent forms that include these named identifiers. Variable is optional based
          on study design.
        in_subset:
        - Consent
        any_of:
        - range: YesNoEnum  # 1=Yes | 0=No
        - range: StandardMissingValueCodes
        annotations:
          provenance: RADx-UP
          value_datatype: integer
          precondition: consent_given = "1"

      # Data element 5 of 159
      # Precondition enforced by rule 3 of 50 (see rules:)
      consent_zip_2:
        title: I agree to let the Duke Clinical Research Institute collect my zip code.
        description: |-
          The `consent_zip_2` variable records response to the prompt, _"I agree to let the Duke Clinical Research Institute collect my zip code."_.

          Values for this variable are integers that are restricted to the list of 2 permissible integer values.

          This variable only records a non-blank value if the value of `consent_given` is `1`, _"Yes, consent is required for this study"_ and the value of `consent_ident` is `0`, _"No"_.
        comments:
        - For consent forms that include zip code. Variable is optional based on study design.
        in_subset:
        - Consent
        any_of:
        - range: YesNoEnum  # 1=Yes | 0=No
        - range: StandardMissingValueCodes
        annotations:
          provenance: RADx-UP
          value_datatype: integer
          precondition: consent_given = "1" and consent_ident = "0"

      # Data element 6 of 159
      # Precondition enforced by rule 4 of 50 (see rules:)
      consent_recontact:
        title: I agree to be contacted for future research.
        description: |-
          The `consent_recontact` variable records response to the prompt, _"I agree to be contacted for future research."_.

          Values for this variable are integers that are restricted to the list of 2 permissible integer values.

          This variable only records a non-blank value if the value of `consent_given` is `1`, _"Yes, consent is required for this study"_.
        comments:
        - For consent forms that include recontact for future research. Variable is optional
          based on study design.
        in_subset:
        - Consent
        any_of:
        - range: YesNoEnum  # 1=Yes | 0=No
        - range: StandardMissingValueCodes
        annotations:
          provenance: RADx-UP
          value_datatype: integer
          precondition: consent_given = "1"

      # Data element 7 of 159
      current_county:
        title: County
        description: The `current_county` variable records response to the prompt, _"County"_.
        range: string
        comments:
        - To match with Census data
        in_subset:
        - Consent
        annotations:
          provenance: RADx-UP

      # Data element 8 of 159
      zip_code:
        title: Zip Code
        description: The `zip_code` variable records response to the prompt, _"Zip Code"_.
        range: string
        comments:
        - PX010801.  Only one of zip_code or zip_code_3digit needs to be collected for tier
          1 compliance.
        in_subset:
        - Consent
        annotations:
          provenance: RADx-UP

      # Data element 9 of 159
      sociodem_date_mdy:
        title: Date of Sociodemographic Data Collection (MM/DD/YYYY)
        description: The `sociodem_date_mdy` variable records response to the prompt, _"Date
          of Sociodemographic Data Collection (MM/DD/YYYY)"_.
        range: date_mdy
        comments:
        - 'Note: Maximum expected day = Current day.'
        in_subset:
        - Consent
        annotations:
          provenance: RADx-UP

      # Data element 10 of 159
      race_ethn_race:
        title: |-
          What is your race?

          Mark one or more boxes. (Check all that apply)
        description: |-
          The `race_ethn_race` variable records response to the prompt, _"What is your race?

          Mark one or more boxes. (Check all that apply)"_.

          Values for this variable are integers that are restricted to the list of 7 permissible integer values.  The value `99` is mutually exclusive with any other values.
        comments:
        - |-
          https://www.phenxtoolkit.org/protocols/view/11901

          U.S. Census Bureau, Census 2020, Questionnaire

          Reduced to OMB + specifiy, added 99, Prefer not to answer
        in_subset:
        - Demographics
        multivalued: true
        any_of:
        - range: RaceEthnRaceEnum  # 1=American Indian or Alaska Native | 2=Black or African American | 3=Asian | 4=Native Hawaiian or  Other Pacific Islander | 5=White | 15=Some other race (+1 more)
        - range: StandardMissingValueCodes
        annotations:
          provenance: RADx-UP
          value_datatype: integer

      # Data element 11 of 159
      # Precondition enforced by rule 5 of 50 (see rules:)
      race_ethn_asian_detail_3:
        title: ' (Check all that apply)'
        description: |-
          The `race_ethn_asian_detail_3` variable records response to the prompt, _" (Check all that apply)"_.

          Values for this variable are integers that are restricted to the list of 23 permissible integer values.  The value `99` is mutually exclusive with any other values.

          This variable only records a non-blank value if the value of `race_ethn_race` is `3`, _"Asian"_.
        comments:
        - detail from RADx-UP projects
        in_subset:
        - Demographics
        multivalued: true
        any_of:
        - range: RaceEthnAsianDetail3Enum  # 6=Asian Indian | 7=Bangladeshi | 8=Bhutanese | 9=Burmese | 10=Cambodian | 3=Chinese, except Taiwanese (+17 more)
        - range: StandardMissingValueCodes
        annotations:
          provenance: RADx-UP
          value_datatype: integer
          precondition: race_ethn_race contains "3"

      # Data element 12 of 159
      # Precondition enforced by rule 6 of 50 (see rules:)
      race_ethn_islander_detail_2:
        title: ' (Check all that apply)'
        description: |-
          The `race_ethn_islander_detail_2` variable records response to the prompt, _" (Check all that apply)"_.

          Values for this variable are integers that are restricted to the list of 15 permissible integer values.  The value `99` is mutually exclusive with any other values.

          This variable only records a non-blank value if the value of `race_ethn_race` is `4`, _"Native Hawaiian or  Other Pacific Islander"_.
        comments:
        - detail from RADx-UP projects
        in_subset:
        - Demographics
        multivalued: true
        any_of:
        - range: RaceEthnIslanderDetail2Enum  # 1=Native Hawaiian | 2=Pacific Islander | 3=Samoan | 4=Tongan | 5=Maori | 6=Fijian (+9 more)
        - range: StandardMissingValueCodes
        annotations:
          provenance: RADx-UP
          value_datatype: integer
          precondition: race_ethn_race contains "4"

      # Data element 13 of 159
      # Precondition enforced by rule 7 of 50 (see rules:)
      race_ethn_orig_other:
        title: Specify other origin.
        description: |-
          The `race_ethn_orig_other` variable records response to the prompt, _"Specify other origin."_.

          This variable only records a non-blank value if the value of `race_ethn_race` is `15`, _"Some other race"_.
        range: string
        comments:
        - |-
          PX011901

          https://www.phenxtoolkit.org/protocols/view/11901

          U.S. Census Bureau, Census 2020, Questionnaire
        in_subset:
        - Demographics
        annotations:
          provenance: RADx-UP
          precondition: race_ethn_race contains "15"

      # Data element 14 of 159
      race_ethn_hispanic:
        title: Are you of Hispanic, Latino, or Spanish origin?
        description: |-
          The `race_ethn_hispanic` variable records response to the prompt, _"Are you of Hispanic, Latino, or Spanish origin?"_.

          Values for this variable are integers that are restricted to the list of 3 permissible integer values.
        comments:
        - |-
          PX011901

          https://www.phenxtoolkit.org/protocols/view/11901

          U.S. Census Bureau, Census 2020, Questionnaire

          Reduced to OMB, Added 99, Prefer not to answer
        in_subset:
        - Demographics
        any_of:
        - range: RaceEthnHispanicEnum  # 0=No, not of Hispanic, Latino, or Spanish origin | 1=Yes, of Hispanic, Latino, or Spanish origin | 99=Prefer not to answer
        - range: StandardMissingValueCodes
        annotations:
          provenance: RADx-UP
          value_datatype: integer

      # Data element 15 of 159
      # Precondition enforced by rule 8 of 50 (see rules:)
      race_ethn_hispanic_detail_2:
        title: Please specify your origin
        description: |-
          The `race_ethn_hispanic_detail_2` variable records response to the prompt, _"Please specify your origin"_.

          Values for this variable are integers that are restricted to the list of 8 permissible integer values.  The value `99` is mutually exclusive with any other values.

          This variable only records a non-blank value if the value of `race_ethn_hispanic` is `1`, _"Yes, of Hispanic, Latino, or Spanish origin"_.
        comments:
        - PX011901
        in_subset:
        - Demographics
        multivalued: true
        any_of:
        - range: RaceEthnHispanicDetail2Enum  # 1=Mexican, Mexican Am., Chicano | 2=Puerto Rican | 3=Cuban | 4=Another Hispanic, Latino, or Spanish origin | 5=Salvadoran | 6=Dominican (+2 more)
        - range: StandardMissingValueCodes
        annotations:
          provenance: RADx-UP
          value_datatype: integer
          precondition: race_ethn_hispanic = "1"

      # Data element 16 of 159
      # Precondition enforced by rule 9 of 50 (see rules:)
      race_ethn_hispanic_other:
        title: Please specify other Hispanic, Latino, or Spanish origin. For example, Salvadoran,
          Dominican, Colombian, Guatemalan, Spaniard, Ecuadorian, etc.
